<!DOCTYPE html>
<html>
<head>
  <title>Login - Semantix AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111827, #0b0f1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: linear-gradient(145deg, #1c2235, #141a2a);
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      box-shadow: 
        0 10px 30px rgba(0,0,0,0.6),
        0 0 10px rgba(0,255,153,0.2);
      text-align: center;
      transition: 0.3s;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    h2 {
      margin-bottom: 20px;
      color: #00ff99;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #0f1625;
      color: white;
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: linear-gradient(135deg, #00ff99, #00cc77);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,255,153,0.3);
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 15px rgba(0,255,153,0.5);
    }

    .switch {
      margin-top: 15px;
      cursor: pointer;
      color: #00ff99;
      font-size: 14px;
    }

    .switch:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<div class="container">

  <h2 id="title">Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="handleAuth()">Login</button>

  <div class="switch" onclick="toggleMode()">
    Don't have an account? Register
  </div>

</div>

<script>

let isLogin = true;

// 🔁 Switch between Login & Register
function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector("button").innerText = isLogin ? "Login" : "Register";
  document.querySelector(".switch").innerText = isLogin 
    ? "Don't have an account? Register" 
    : "Already have an account? Login";
}

// 🔐 Handle Login / Register
function handleAuth() {

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!user || !pass) {
    alert("Please fill all fields");
    return;
  }

  if (isLogin) {

    // LOGIN
    if (user === localStorage.getItem("user") &&
        pass === localStorage.getItem("pass")) {

      alert("Login successful!");
      localStorage.setItem("loggedIn", "true");

      window.location.href = "./app.html";

    } else {
      alert("Invalid username or password");
    }

  } else {

    // REGISTER
    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);

    alert("Registered successfully! Now login.");
    toggleMode();
  }
}

</script>

</body>
</html>
